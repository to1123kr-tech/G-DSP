
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>G-DSP 지도 검색</title>

<style>

body{
background:#0b1220;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
font-size:24px;
}

#searchBox{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
padding:10px;
font-size:16px;
width:300px;
}

button{
padding:10px 20px;
font-size:16px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#mapFrame{
width:100%;
height:700px;
border:none;
background:black;
}

.links{
margin-top:10px;
}

.links button{
background:#059669;
margin-right:10px;
}

</style>
</head>

<body>

<h1>G-DSP 공간정보 조회</h1>

<div id="searchBox">

<input id="addr" placeholder="지번 또는 주소 입력">

<button onclick="searchAddr()">검색</button>

</div>

<iframe id="mapFrame"></iframe>

<div class="links">

<button onclick="openLand()">토지이음</button>
<button onclick="openBuilding()">건축물대장</button>

</div>

<script>

let lastAddress = ""

async function searchAddr(){

const addr=document.getElementById("addr").value

lastAddress = addr

const res = await fetch("/api/address?q="+encodeURIComponent(addr))

const data = await res.json()

if(!data.response){
alert("검색 실패")
return
}

const item=data.response.result.items[0]

const x=item.point.x
const y=item.point.y

const mapURL="https://map.vworld.kr/map/maps.do?x="+x+"&y="+y+"&level=16"

document.getElementById("mapFrame").src=mapURL

}

function openLand(){

if(!lastAddress){
alert("먼저 검색하세요")
return
}

window.open("https://www.eum.go.kr/web/ar/lu/luLandDet.jsp?addr="+encodeURIComponent(lastAddress))

}

function openBuilding(){

if(!lastAddress){
alert("먼저 검색하세요")
return
}

window.open("https://www.eais.go.kr")

}

</script>

</body>
</html>
