<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카카오 API 테스트</title>
<style>
body{font-family:Arial,sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#f5f5f5}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:6px;font-size:14px;box-sizing:border-box}
button{background:#3b1d8e;color:#fff;border:none;padding:12px 24px;border-radius:6px;cursor:pointer;font-size:14px;width:100%}
button:hover{background:#5a2fc2}
pre{background:#222;color:#0f0;padding:16px;border-radius:8px;overflow-x:auto;font-size:12px;margin-top:16px}
.label{font-size:13px;font-weight:700;color:#333;margin-top:12px}
</style>
</head>
<body>
<h2>🔑 카카오 API 테스트</h2>

<div class="label">REST API 키 입력</div>
<input id="apiKey" type="text" placeholder="REST API 키 붙여넣기">

<div class="label">검색할 주소</div>
<input id="query" type="text" value="화성시 남양읍 한가울길 70">

<button onclick="test()">테스트</button>

<pre id="result">결과가 여기 표시됩니다...</pre>

<script>
function test(){
  var key=document.getElementById('apiKey').value.trim();
  var q=document.getElementById('query').value.trim();
  if(!key){alert('REST API 키를 입력하세요');return;}
  document.getElementById('result').textContent='조회 중...';
  fetch('https://dapi.kakao.com/v2/local/search/address.json?query='+encodeURIComponent(q),{
    headers:{'Authorization':'KakaoAK '+key}
  })
  .then(function(r){return r.json();})
  .then(function(d){
    document.getElementById('result').textContent=JSON.stringify(d,null,2);
  })
  .catch(function(e){
    document.getElementById('result').textContent='에러: '+e.message;
  });
}
</script>
</body>
</html>
