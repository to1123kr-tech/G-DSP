
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운동 기록</title>

<style>
body{font-family:Arial;background:#111;color:#fff;margin:0;text-align:center}
header{padding:14px;font-size:22px;font-weight:bold}
.container{padding:15px;padding-bottom:90px}

button{
width:90%;
padding:16px;
margin:8px;
font-size:17px;
border-radius:10px;
border:none;
background:#2b2b2b;
color:#fff
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000
}

.bottom button{
flex:1;
margin:0;
border-radius:0;
padding:14px;
font-size:15px
}

.hidden{display:none}

.calendar{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#1c1c1c;
border-radius:12px;
width:90px;
margin:6px;
padding:8px;
}

.am{color:#4aa3ff}
.pm{color:#ff8c3a}

.dot{
height:8px;
width:8px;
border-radius:50%;
display:inline-block;
margin:2px;
}

.amdot{background:#4aa3ff}
.pmdot{background:#ff8c3a}

img{
width:95%;
border-radius:10px;
margin-top:8px
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
}

.popupBox{
background:#222;
padding:20px;
border-radius:10px;
width:90%;
}

.result{margin-top:10px;color:#00ff9c}

</style>
</head>

<body>

<header>운동 기록</header>

<div class="container">

<div id="camera">
<h3>내사진 촬영</h3>
<input type="file" accept="image/*" capture="environment" id="cameraInput">
</div>

<div id="upload" class="hidden">
<h3>업로드</h3>
<button onclick="chooseType('런닝')">런닝 사진</button>
<button onclick="chooseType('걸음')">걸음 캡처</button>
<input type="file" id="uploadInput" class="hidden" accept="image/*">
</div>

<div id="calendar" class="hidden">
<h3>달력</h3>
<div class="calendar" id="calendarGrid"></div>
</div>

<div id="ocr" class="hidden">
<h3>OCR 테스트</h3>
<input type="file" accept="image/*" id="ocrImage">
<button onclick="runOCR()">OCR 실행</button>
<div class="result" id="ocrResult"></div>
</div>

<div id="settings" class="hidden">
<h3>API 설정</h3>
<input type="password" id="apikey" placeholder="Gemini API KEY" style="width:90%;padding:10px">
<button onclick="saveKey()">저장</button>
<p id="keyInfo"></p>
</div>

</div>

<div class="bottom">
<button onclick="show('camera')">카메라</button>
<button onclick="show('upload')">업로드</button>
<button onclick="show('calendar')">📅달력</button>
<button onclick="show('ocr')">OCR</button>
<button onclick="show('settings')">설정</button>
</div>

<div id="popup" class="popup hidden">
<div class="popupBox">
<div id="popupContent"></div>
<br>
<button onclick="closePopup()">닫기</button>
</div>
</div>

<script>

let records={}
let uploadType=""

function show(id){

["camera","upload","calendar","ocr","settings"].forEach(x=>{
document.getElementById(x).classList.add("hidden")
})

document.getElementById(id).classList.remove("hidden")

if(id=="calendar") renderCalendar()

}

function today(){
let d=new Date()
return d.toISOString().split("T")[0]
}

function chooseType(type){
uploadType=type
document.getElementById("uploadInput").click()
}

function addRecord(type,file){

let date=today()

if(!records[date]) records[date]={}

if(type=="런닝"){

let min=prompt("운동 시간 (분)")

if(!min) return

let hour=new Date().getHours()
let p=hour<12?"AM":"PM"

records[date][p]={
minutes:min,
img:URL.createObjectURL(file)
}

}

if(type=="걸음"){
records[date].step=true
}

renderCalendar()

}

document.getElementById("cameraInput").onchange=function(){

let f=this.files[0]
if(!f) return

addRecord("내사진",f)

}

document.getElementById("uploadInput").onchange=function(){

let f=this.files[0]
if(!f) return

addRecord(uploadType,f)

}

function renderCalendar(){

let grid=document.getElementById("calendarGrid")
grid.innerHTML=""

for(let i=1;i<=30;i++){

let date="2026-03-"+String(i).padStart(2,"0")
let r=records[date]

let dots=""
let am="-"
let pm="-"


if(r){

if(r.AM){
dots+="<span class='dot amdot'></span>"
am=r.AM.minutes+"분"
}

if(r.PM){
dots+="<span class='dot pmdot'></span>"
pm=r.PM.minutes+"분"
}

}

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<b>${i}</b>
<div>${dots}</div>
<div class="am">AM ${am}</div>
<div class="pm">PM ${pm}</div>
`

card.onclick=function(){

if(r){

let html=""

if(r.AM){
html+="<div>오전 "+r.AM.minutes+"분</div>"
html+="<img src='"+r.AM.img+"'>"
}

if(r.PM){
html+="<div>오후 "+r.PM.minutes+"분</div>"
html+="<img src='"+r.PM.img+"'>"
}

document.getElementById("popupContent").innerHTML=html
document.getElementById("popup").classList.remove("hidden")

}

}

grid.appendChild(card)

}

}

function closePopup(){
document.getElementById("popup").classList.add("hidden")
}

function saveKey(){

let k=document.getElementById("apikey").value
localStorage.setItem("gemini_api",k)

document.getElementById("keyInfo").innerText="저장됨 ****"+k.slice(-4)

}

async function runOCR(){

let key=localStorage.getItem("gemini_api")

if(!key){
alert("API 키 필요")
return
}

let file=document.getElementById("ocrImage").files[0]

if(!file){
alert("사진 선택")
return
}

let reader=new FileReader()

reader.onload=async function(){

let base64=reader.result.split(",")[1]

document.getElementById("ocrResult").innerText="분석중..."

try{

let res=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+key,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{
parts:[
{text:"이미지에서 숫자와 시간만 추출해"},
{inline_data:{mime_type:"image/jpeg",data:base64}}
]
}]
})
})

let data=await res.json()

let txt=data.candidates?.[0]?.content?.parts?.[0]?.text || "결과 없음"

document.getElementById("ocrResult").innerText=txt

}catch(e){

document.getElementById("ocrResult").innerText="API 오류"

}

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
