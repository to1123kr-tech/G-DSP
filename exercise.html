
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운동 기록</title>

<style>
body{font-family:Arial;background:#111;color:#fff;text-align:center;margin:0}
header{padding:15px;font-size:22px}
button{padding:14px;margin:8px;border:none;border-radius:10px;background:#2b2b2b;color:white;width:90%}
input{width:90%;padding:10px;margin:8px}
.card{background:#1c1c1c;margin:10px;border-radius:10px;padding:10px}
.small{color:#aaa;font-size:14px}
</style>
</head>

<body>

<header>운동 기록</header>

<div>

<button onclick="uploadRun()">런닝 사진 업로드</button>
<input type="file" id="runFile" accept="image/*" style="display:none">

<div class="card">
<div>읽은 시간</div>
<div id="timeResult">-</div>
<button onclick="editTime()">수정</button>
</div>

<div class="card">
<div>API KEY</div>
<input id="apiKey" placeholder="Gemini API Key">
<button onclick="saveKey()">저장</button>
<div id="keyStatus" class="small"></div>
</div>

</div>

<script>

let lastMinutes = null

function uploadRun(){
document.getElementById("runFile").click()
}

document.getElementById("runFile").onchange = function(){

const file = this.files[0]
if(!file) return

runOCR(file)

}

function saveKey(){

const k=document.getElementById("apiKey").value
localStorage.setItem("gemini_key",k)

document.getElementById("keyStatus").innerText="저장됨 ****"+k.slice(-4)

}

async function runOCR(file){

const key = localStorage.getItem("gemini_key")

if(!key){
alert("API 키 먼저 저장")
return
}

const reader=new FileReader()

reader.onload=async function(){

const base64 = reader.result.split(",")[1]

document.getElementById("timeResult").innerText="읽는중..."

try{

const res = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+key,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{
parts:[
{text:"이미지에서 운동 시간 하나만 찾아라. 형식 예: 1:00"},
{inline_data:{mime_type:"image/jpeg",data:base64}}
]
}]
})
})

const data = await res.json()

let txt = data.candidates?.[0]?.content?.parts?.[0]?.text || ""

let match = txt.match(/\d{1,2}:\d{2}/)

if(match){

let t = match[0]

let parts = t.split(":")

let minutes = parseInt(parts[0])*60 + parseInt(parts[1])

lastMinutes = minutes

document.getElementById("timeResult").innerText = minutes + " 분"

}else{

document.getElementById("timeResult").innerText="읽기 실패"

}

}catch(e){

document.getElementById("timeResult").innerText="API 오류"

}

}

reader.readAsDataURL(file)

}

function editTime(){

let v = prompt("분 입력", lastMinutes || "")

if(v){

lastMinutes = v

document.getElementById("timeResult").innerText = v + " 분"

}

}

</script>

</body>
</html>
