<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>G-DSP — 문의 게시판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f7fa;--bg2:#eef1f6;--card:#fff;--line:#dde3ed;--line2:#c8d0e0;
  --txt:#1a2540;--txt2:#3d5070;--txt3:#7a90b0;
  --blue:#2563eb;--blue2:#3b82f6;--blue3:#1d4ed8;
  --green:#059669;--red:#ef4444;--purple:#7c3aed;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
button,input,select,textarea{font:inherit;cursor:pointer}
button{border:none;background:none;color:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
body.dark{--bg:#0f1623;--bg2:#141e2e;--card:#1a2640;--line:#243552;--line2:#2e4168;--txt:#e8f0ff;--txt2:#aabbd4;--txt3:#6a85a8}
.wrap{display:flex;flex-direction:column;height:100vh}
.hdr{height:52px;display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--card);border-bottom:1px solid var(--line);box-shadow:0 1px 4px rgba(0,0,0,.06);flex-shrink:0}
.hdr-logo{font-size:15px;font-weight:900;color:var(--blue);letter-spacing:1px}
.hdr-sep{width:1px;height:18px;background:var(--line)}
.hdr-title{font-size:14px;font-weight:700;color:var(--txt)}
.hdr-sub{font-size:11px;color:var(--txt3);margin-left:4px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hbtn{height:30px;padding:0 12px;border-radius:7px;border:1px solid var(--line2);background:var(--card);color:var(--txt2);font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.hbtn:hover{border-color:var(--blue2);color:var(--blue2)}
.hbtn.close{border-color:rgba(239,68,68,.3);color:var(--red);background:rgba(239,68,68,.05)}
.hbtn.close:hover{background:rgba(239,68,68,.1)}
.body{flex:1;overflow-y:auto;padding:20px;display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
.write-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;position:sticky;top:0}
.card-title{font-size:12px;font-weight:700;color:var(--txt3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title svg{width:13px;height:13px;color:var(--purple)}
.mf{width:100%;height:36px;padding:0 12px;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;color:var(--txt);font-size:12px;outline:none;transition:.15s;margin-bottom:8px}
.mf:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.mf::placeholder{color:var(--txt3)}
textarea.mf{height:110px;padding:10px 12px;resize:vertical}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.type-btn{height:32px;border-radius:7px;border:1px solid var(--line2);background:var(--bg2);color:var(--txt3);font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.type-btn.on{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.3);color:var(--purple)}
.submit-btn{width:100%;height:40px;border-radius:9px;background:linear-gradient(135deg,var(--blue3),var(--blue2));border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;margin-top:4px}
.submit-btn:hover{filter:brightness(1.08)}
.list-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.list-hdr-title{font-size:14px;font-weight:700;color:var(--txt)}
.list-count{font-size:11px;color:var(--txt3);background:var(--bg2);padding:2px 8px;border-radius:10px;border:1px solid var(--line)}
.list-empty{text-align:center;color:var(--txt3);font-size:13px;padding:48px 0}
.list-empty svg{width:40px;height:40px;opacity:.25;margin:0 auto 10px;display:block}
.inq-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:8px;transition:.15s}
.inq-card:hover{border-color:var(--line2);box-shadow:var(--shadow)}
.inq-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.inq-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.b-idea{background:rgba(37,99,235,.1);color:var(--blue2);border:1px solid rgba(37,99,235,.2)}
.b-bug{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.b-help{background:rgba(5,150,105,.1);color:var(--green);border:1px solid rgba(5,150,105,.2)}
.b-etc{background:rgba(124,58,237,.1);color:var(--purple);border:1px solid rgba(124,58,237,.2)}
.inq-name{font-size:12px;font-weight:700;color:var(--txt)}
.inq-date{font-size:10px;color:var(--txt3);margin-left:auto}
.inq-content{font-size:12px;color:var(--txt2);line-height:1.7;white-space:pre-wrap}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.theme-btn{height:28px;padding:0 11px;border-radius:7px;border:1px solid var(--line2);background:var(--bg2);color:var(--txt2);font-size:11px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <span class="hdr-logo">G-DSP</span>
    <div class="hdr-sep"></div>
    <span class="hdr-title">💬 문의 게시판</span>
    <span class="hdr-sub">건의 · 오류 신고 · 사용법 문의</span>
    <div class="hdr-right">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 다크</button>
      <button class="hbtn close" onclick="window.close()">✕ 닫기</button>
    </div>
  </div>

  <div class="body">
    <div class="write-card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        문의 작성
      </div>
      <input class="mf" id="inqName" type="text" placeholder="이름 (선택 · 미입력 시 익명)">
      <div class="type-grid">
        <button class="type-btn on" id="type-0" onclick="setType(0,'기능 건의')">💡 기능 건의</button>
        <button class="type-btn" id="type-1" onclick="setType(1,'오류 신고')">🐛 오류 신고</button>
        <button class="type-btn" id="type-2" onclick="setType(2,'사용법 문의')">❓ 사용법 문의</button>
        <button class="type-btn" id="type-3" onclick="setType(3,'기타')">📌 기타</button>
      </div>
      <textarea class="mf" id="inqContent" placeholder="문의 내용을 입력하세요..."></textarea>
      <button class="submit-btn" onclick="submitInquiry()">✉ 문의 등록</button>
    </div>

    <div>
      <div class="list-hdr">
        <span class="list-hdr-title">등록된 문의</span>
        <span class="list-count" id="inqCount">0건</span>
      </div>
      <div id="inqList"></div>
      <div class="list-empty" id="inqEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        아직 등록된 문의가 없습니다
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
var inqItems = JSON.parse(localStorage.getItem('gdsp_inq')||'[]');
var selType = '기능 건의';
var _tt;
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';t.style.background=type==='err'?'#991b1b':type==='ok'?'#0f766e':'#1e293b';clearTimeout(_tt);_tt=setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},2400);}
function setType(idx,t){
  selType=t;
  for(var i=0;i<4;i++){var b=document.getElementById('type-'+i);if(b)b.classList.toggle('on',i===idx);}
}
function submitInquiry(){
  var name=document.getElementById('inqName').value.trim();
  var content=document.getElementById('inqContent').value.trim();
  if(!content){toast('내용을 입력하세요','err');return;}
  var now=new Date();
  inqItems.unshift({name:name||'익명',type:selType,content:content,date:now.toLocaleDateString(),time:now.toLocaleTimeString()});
  localStorage.setItem('gdsp_inq',JSON.stringify(inqItems));
  document.getElementById('inqContent').value='';
  document.getElementById('inqName').value='';
  renderInq();
  toast('문의가 등록되었습니다','ok');
}
var badgeMap={'기능 건의':'b-idea','오류 신고':'b-bug','사용법 문의':'b-help','기타':'b-etc'};
function renderInq(){
  var list=document.getElementById('inqList'),empty=document.getElementById('inqEmpty'),cnt=document.getElementById('inqCount');
  if(cnt)cnt.textContent=inqItems.length+'건';
  if(!inqItems.length){list.innerHTML='';if(empty)empty.style.display='block';return;}
  if(empty)empty.style.display='none';
  list.innerHTML=inqItems.map(function(q){
    var bc=badgeMap[q.type]||'b-etc';
    return '<div class="inq-card">'
      +'<div class="inq-top"><span class="inq-badge '+bc+'">'+q.type+'</span>'
      +'<span class="inq-name">'+q.name+'</span>'
      +'<span class="inq-date">'+q.date+' '+q.time+'</span></div>'
      +'<div class="inq-content">'+q.content+'</div>'
      +'</div>';
  }).join('');
}
function toggleTheme(){
  var d=document.body.classList.toggle('dark');
  var btn=document.getElementById('themeBtn');if(btn)btn.textContent=d?'☀️ 라이트':'🌙 다크';
  localStorage.setItem('gdsp_theme',d?'dark':'light');
}
(function(){
  if(localStorage.getItem('gdsp_theme')==='dark'){document.body.classList.add('dark');var btn=document.getElementById('themeBtn');if(btn)btn.textContent='☀️ 라이트';}
  renderInq();
})();
</script>
</body>
</html>
