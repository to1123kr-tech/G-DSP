<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-DSP 지도 — 화성시 GIS 스타일</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/dist/ol.js"></script>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=0f432d6e8470eed32f947e3c7db146b9&libraries=services"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#0d1018; --panel:#13182a; --text:#e6eaf2; --muted:#8a93a8;
  --line:rgba(255,255,255,0.08); --accent:#36cfc9; --gold:#ffd166;
  --red:#ff4757; --orange:#ff9f43; --yellow:#ffd166; --green:#06d6a0;
  --purple:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Pretendard','Malgun Gothic',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}

.topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(19,24,42,0.95);border-bottom:1px solid var(--line);flex-shrink:0;z-index:100}
.logo{font-weight:700;font-size:18px;color:var(--accent);letter-spacing:-0.5px}
.logo .ver{font-size:9px;color:var(--gold);background:rgba(255,209,102,0.15);padding:1px 4px;border-radius:3px;margin-left:2px;font-weight:500}
.search-box{flex:1;display:flex;gap:6px;max-width:600px}
.search-input{flex:1;padding:7px 12px;background:#1a2034;border:1px solid var(--line);border-radius:6px;color:var(--text);font-size:13px}
.search-input:focus{outline:none;border-color:var(--accent)}
.btn{padding:7px 14px;background:var(--accent);border:none;border-radius:6px;color:#000;font-weight:600;cursor:pointer;font-size:13px}
.btn:hover{filter:brightness(1.1)}
.tools{display:flex;gap:6px;flex-wrap:wrap}
.tool-btn{padding:7px 12px;background:#1a2034;border:1px solid var(--line);border-radius:6px;color:var(--text);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px}
.tool-btn:hover{background:#252b48;border-color:var(--accent)}
.tool-btn.heritage{background:#8b1e3f;border-color:#8b1e3f;color:#fff}
.tool-btn.heritage:hover{background:#a52450}

.main{display:flex;flex:1;overflow:hidden;position:relative;min-height:0}

.sidebar{width:240px;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;flex-shrink:0;padding:10px}
.sec{margin-bottom:14px}
.sec-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;padding-left:4px}
.row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;margin-bottom:2px}
.row:hover{background:rgba(255,255,255,0.04)}
.label{font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.red{background:var(--red)} .dot.orange{background:var(--orange)}
.dot.yellow{background:var(--yellow)} .dot.green{background:var(--green)}
.dot.purple{background:var(--purple)}

.tog{position:relative;width:36px;height:20px;flex-shrink:0;cursor:pointer}
.tog input{opacity:0;width:0;height:0}
.tog .slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#2a3050;border-radius:20px;transition:0.2s}
.tog .slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:0.2s}
.tog input:checked+.slider{background:var(--accent)}
.tog input:checked+.slider:before{transform:translateX(16px)}

.map-wrap{flex:1;position:relative;overflow:hidden;min-width:0}
#olMap{position:absolute !important;inset:0 !important;width:100% !important;height:100% !important;background:#1a1f30}
#olMap .ol-attribution,#olMap .ol-zoom{display:none !important}

.map-info{position:absolute;bottom:14px;left:14px;background:rgba(13,16,24,0.92);padding:10px 14px;border-radius:8px;font-size:12px;color:var(--text);max-width:380px;z-index:50;border:1px solid var(--line);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.map-info .pin-jibun{color:var(--gold);font-weight:600;font-size:13px}
.map-info .pin-coord{color:var(--muted);font-size:11px;margin-top:2px}

.map-zoom{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:4px;z-index:50}
.map-zoom button{width:36px;height:36px;background:rgba(13,16,24,0.92);border:1px solid var(--line);border-radius:6px;color:var(--text);cursor:pointer;font-size:18px;font-weight:700}
.map-zoom button:hover{background:#252b48;border-color:var(--accent)}

.map-type{position:absolute;top:14px;left:14px;display:flex;gap:0;z-index:50;background:rgba(13,16,24,0.92);border-radius:8px;border:1px solid var(--line);overflow:hidden}
.map-type button{padding:8px 14px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:12px}
.map-type button.on{background:var(--accent);color:#000;font-weight:600}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:10px 20px;background:rgba(13,16,24,0.95);border:1px solid var(--accent);border-radius:8px;color:var(--text);font-size:13px;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.3s;white-space:nowrap}
.toast.show{opacity:1}
.toast.err{border-color:var(--red)}
.toast.ok{border-color:var(--green)}

.watermark{position:absolute;bottom:14px;right:14px;color:rgba(255,255,255,0.3);font-size:10px;z-index:50;pointer-events:none}

.ctx-menu{position:fixed;background:rgba(13,16,24,0.97);border:1px solid var(--line);border-radius:8px;padding:6px;z-index:500;display:none;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.ctx-menu.show{display:block}
.ctx-item{padding:8px 14px;color:var(--text);cursor:pointer;font-size:13px;border-radius:4px}
.ctx-item:hover{background:var(--accent);color:#000}
.ctx-divider{height:1px;background:var(--line);margin:4px 0}

.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:#252b48;border-radius:3px}

@media (max-width: 768px){.sidebar{width:200px}.tool-btn{padding:6px 8px;font-size:11px}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">G-DSP <span class="ver">v3</span></div>
  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="지번 입력 (예: 봉담읍 와우리 597)" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn" onclick="doSearch()">검색</button>
  </div>
  <div class="tools">
    <button class="tool-btn" onclick="captureMap('png')">📷 PNG</button>
    <button class="tool-btn" onclick="captureMap('jpg')">📷 JPG</button>
    <button class="tool-btn heritage" onclick="openHeritageGIS()">🏛 국가유산청</button>
    <button class="tool-btn" onclick="window.close()">✕ 닫기</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sec">
      <div class="sec-title">기본 레이어</div>
      <div class="row"><div class="label">📐 지적선 + 지번</div><label class="tog"><input type="checkbox" id="chkCadastral" checked onchange="toggleLayer('cadastral', this.checked)"><span class="slider"></span></label></div>
    </div>
    <div class="sec">
      <div class="sec-title">🏘 토지정보</div>
      <div class="row"><div class="label">용도지역</div><label class="tog"><input type="checkbox" id="chkZoneUse" onchange="toggleLayer('zone_use', this.checked)"><span class="slider"></span></label></div>
      <div class="row"><div class="label">지구단위계획</div><label class="tog"><input type="checkbox" id="chkDistPlan" onchange="toggleLayer('dist_plan', this.checked)"><span class="slider"></span></label></div>
    </div>
    <div class="sec">
      <div class="sec-title">🌳 환경등급 (생태자연도)</div>
      <div class="row"><div class="label"><span class="dot red"></span>1등급</div><label class="tog"><input type="checkbox" id="chkEco1" onchange="toggleLayer('eco1', this.checked)"><span class="slider"></span></label></div>
      <div class="row"><div class="label"><span class="dot orange"></span>2등급</div><label class="tog"><input type="checkbox" id="chkEco2" onchange="toggleLayer('eco2', this.checked)"><span class="slider"></span></label></div>
      <div class="row"><div class="label"><span class="dot yellow"></span>3등급</div><label class="tog"><input type="checkbox" id="chkEco3" onchange="toggleLayer('eco3', this.checked)"><span class="slider"></span></label></div>
      <div class="row"><div class="label"><span class="dot green"></span>별도관리</div><label class="tog"><input type="checkbox" id="chkEco4" onchange="toggleLayer('eco4', this.checked)"><span class="slider"></span></label></div>
    </div>
    <div class="sec">
      <div class="sec-title">🏛 문화재 (허가검토용)</div>
      <div class="row"><div class="label"><span class="dot red"></span>보호구역</div><label class="tog"><input type="checkbox" id="chkHer1" onchange="toggleLayer('her1', this.checked)"><span class="slider"></span></label></div>
      <div class="row"><div class="label"><span class="dot orange"></span>영향검토</div><label class="tog"><input type="checkbox" id="chkHer2" onchange="toggleLayer('her2', this.checked)"><span class="slider"></span></label></div>
      <div class="row"><div class="label"><span class="dot yellow"></span>영향평가</div><label class="tog"><input type="checkbox" id="chkHer3" onchange="toggleLayer('her3', this.checked)"><span class="slider"></span></label></div>
    </div>
  </div>

  <div class="map-wrap">
    <div id="olMap"></div>
    <div class="map-type">
      <button id="btnSat" class="on" onclick="setBaseLayer('sat', this)">위성</button>
      <button id="btnRoad" onclick="setBaseLayer('road', this)">일반</button>
    </div>
    <div class="map-zoom">
      <button onclick="zoomIn()">+</button>
      <button onclick="zoomOut()">−</button>
    </div>
    <div class="map-info" id="mapInfo">
      <div class="pin-jibun" id="pinJibun">지도 클릭 시 필지 정보 표시</div>
      <div class="pin-coord" id="pinCoord">화성시 남양읍 (기본 위치)</div>
    </div>
    <div class="watermark">G-DSP © 2026 · 측정값은 참고용</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxAction('copy_jibun')">📋 지번 복사</div>
  <div class="ctx-item" onclick="ctxAction('copy_coord')">📋 좌표 복사</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" onclick="ctxAction('open_heritage')">🏛 국가유산청 GIS</div>
  <div class="ctx-item" onclick="ctxAction('open_naver')">🗺 네이버 지도</div>
  <div class="ctx-item" onclick="ctxAction('open_eum')">📋 토지이음</div>
</div>

<script>
// ==================== 설정 ====================
var _proto = (window.location.protocol === 'https:' ? 'https:' : 'http:');
var _host = window.location.hostname;
var PROXY = (_host.indexOf('nip.io') > -1)
  ? _proto + '//' + _host
  : 'http://168.107.15.68:5050';

// ==================== 상태 ====================
var olMap = null;
var baseSatLayer = null, baseRoadLayer = null;
var dynLayers = {}; // 동적 레이어 (cadastral, zone_use, eco1, ...)
var highlightLayer = null;
var markerLayer = null;
var kakaoGeocoder = null;
var currentLat = 37.2055, currentLng = 126.8317;
var selectedJibun = '', selectedCoord = '';
var contextLat = 0, contextLng = 0, contextJibun = '';

// VWorld WMS 레이어 매핑
var WMS_LAYERS = {
  cadastral:  { name: 'lt_c_landinfobasemap', label: '지적선+지번', opacity: 1.0,  zIndex: 5 },
  zone_use:   { name: 'lt_c_uq111',           label: '용도지역',     opacity: 0.55, zIndex: 3 },
  dist_plan:  { name: 'lt_c_uq121',           label: '지구단위계획', opacity: 0.55, zIndex: 3 },
  eco1:       { name: 'lt_c_ue901',           label: '환경 1등급',   opacity: 0.55, zIndex: 4 },
  eco2:       { name: 'lt_c_ue902',           label: '환경 2등급',   opacity: 0.55, zIndex: 4 },
  eco3:       { name: 'lt_c_ue903',           label: '환경 3등급',   opacity: 0.55, zIndex: 4 },
  eco4:       { name: 'lt_c_ue904',           label: '별도관리',     opacity: 0.55, zIndex: 4 },
  her1:       { name: 'lt_c_ud801',           label: '문화재 보호',   opacity: 0.6,  zIndex: 4 },
  her2:       { name: 'lt_c_ud802',           label: '영향검토',     opacity: 0.5,  zIndex: 4 },
  her3:       { name: 'lt_c_ud810',           label: '영향평가',     opacity: 0.4,  zIndex: 4 }
};

// ==================== 지도 초기화 ====================
function initMap() {
  if (typeof ol === 'undefined') {
    setTimeout(initMap, 200);
    return;
  }

  // 1. 위성 배경 (VWorld)
  baseSatLayer = new ol.layer.Tile({
    source: new ol.source.XYZ({
      url: PROXY + '/api/vw-tile/Satellite/{z}/{y}/{x}.jpeg',
      maxZoom: 19,
      crossOrigin: 'anonymous'
    }),
    zIndex: 1
  });

  // 2. 일반 배경 (VWorld Base)
  baseRoadLayer = new ol.layer.Tile({
    source: new ol.source.XYZ({
      url: PROXY + '/api/vw-tile/Base/{z}/{y}/{x}.png',
      maxZoom: 19,
      crossOrigin: 'anonymous'
    }),
    visible: false,
    zIndex: 1
  });

  // 3. 선택 필지 하이라이트 레이어
  highlightLayer = new ol.layer.Vector({
    source: new ol.source.Vector(),
    style: new ol.style.Style({
      stroke: new ol.style.Stroke({ color: '#ff4757', width: 3 }),
      fill: new ol.style.Fill({ color: 'rgba(255,71,87,0.15)' })
    }),
    zIndex: 9
  });

  // 4. 마커 레이어
  markerLayer = new ol.layer.Vector({
    source: new ol.source.Vector(),
    style: new ol.style.Style({
      image: new ol.style.Circle({
        radius: 8,
        fill: new ol.style.Fill({ color: '#36cfc9' }),
        stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
      })
    }),
    zIndex: 10
  });

  olMap = new ol.Map({
    target: 'olMap',
    layers: [baseSatLayer, baseRoadLayer, highlightLayer, markerLayer],
    view: new ol.View({
      center: ol.proj.fromLonLat([currentLng, currentLat]),
      zoom: 17,
      maxZoom: 21,
      minZoom: 6
    }),
    controls: []
  });

  // viewport 0 문제 해결 - 여러 시점에 강제 리사이즈
  setTimeout(function(){ if (olMap) olMap.updateSize(); }, 100);
  setTimeout(function(){ if (olMap) olMap.updateSize(); }, 500);
  setTimeout(function(){ if (olMap) olMap.updateSize(); }, 1500);
  window.addEventListener('resize', function(){ if (olMap) olMap.updateSize(); });

  // 좌클릭: 필지 정보 + 마커
  olMap.on('click', function(evt) {
    var lonLat = ol.proj.toLonLat(evt.coordinate);
    var lng = lonLat[0], lat = lonLat[1];
    currentLat = lat; currentLng = lng;

    // 마커 추가
    markerLayer.getSource().clear();
    var marker = new ol.Feature({ geometry: new ol.geom.Point(evt.coordinate) });
    markerLayer.getSource().addFeature(marker);

    setText('pinJibun', '⏳ 조회 중...');
    setText('pinCoord', '위도 ' + lat.toFixed(6) + ' / 경도 ' + lng.toFixed(6));

    // 카카오 주소 변환
    if (kakaoGeocoder) {
      kakaoGeocoder.coord2Address(lng, lat, function(result, status) {
        if (status === kakao.maps.services.Status.OK && result[0] && result[0].address) {
          var jibun = result[0].address.address_name || '';
          selectedJibun = jibun;
          setText('pinJibun', '📍 ' + jibun);
          toast('✓ ' + jibun, 'ok');
          // 필지 하이라이트
          highlightParcel(lng, lat);
        } else {
          setText('pinJibun', '주소 없음');
        }
      });
    }
  });

  // 우클릭: 컨텍스트 메뉴
  olMap.getViewport().addEventListener('contextmenu', function(e) {
    e.preventDefault();
    var coord = olMap.getEventCoordinate(e);
    var lonLat = ol.proj.toLonLat(coord);
    contextLng = lonLat[0]; contextLat = lonLat[1];

    if (kakaoGeocoder) {
      kakaoGeocoder.coord2Address(contextLng, contextLat, function(result, status) {
        if (status === kakao.maps.services.Status.OK && result[0] && result[0].address) {
          contextJibun = result[0].address.address_name || '';
        }
      });
    }
    var menu = document.getElementById('ctxMenu');
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.classList.add('show');
  });

  document.addEventListener('click', function() {
    document.getElementById('ctxMenu').classList.remove('show');
  });

  // 카카오 SDK 로드 후 geocoder 초기화
  if (window.kakao && kakao.maps && kakao.maps.services) {
    kakaoGeocoder = new kakao.maps.services.Geocoder();
  } else {
    var checkKakao = setInterval(function(){
      if (window.kakao && kakao.maps && kakao.maps.services) {
        kakaoGeocoder = new kakao.maps.services.Geocoder();
        clearInterval(checkKakao);
      }
    }, 200);
  }

  // 기본 레이어 자동 ON (지적선)
  setTimeout(function() {
    toggleLayer('cadastral', true);
  }, 800);

  toast('✓ 지도 준비 완료', 'ok');
}

// ==================== VWorld WMS 레이어 토글 ====================
function toggleLayer(type, on) {
  if (!olMap) {
    setTimeout(function(){ toggleLayer(type, on); }, 500);
    return;
  }
  var info = WMS_LAYERS[type];
  if (!info) return;

  if (on) {
    if (dynLayers[type]) {
      dynLayers[type].setVisible(true);
    } else {
      var lyr = new ol.layer.Tile({
        source: new ol.source.TileWMS({
          url: PROXY + '/api/vw-wms',
          params: {
            'LAYERS': info.name,
            'STYLES': info.name,
            'FORMAT': 'image/png',
            'TRANSPARENT': true,
            'TILED': true,
            'VERSION': '1.3.0',
            'CRS': 'EPSG:3857'
          },
          serverType: 'mapserver',
          crossOrigin: 'anonymous'
        }),
        opacity: info.opacity,
        zIndex: info.zIndex
      });
      olMap.addLayer(lyr);
      dynLayers[type] = lyr;
    }
    toast(info.label + ' ON', 'ok');
  } else {
    if (dynLayers[type]) {
      dynLayers[type].setVisible(false);
    }
    toast(info.label + ' OFF');
  }
}

// ==================== 배경 레이어 전환 ====================
function setBaseLayer(type, btn) {
  document.querySelectorAll('.map-type button').forEach(function(b){ b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  if (type === 'sat') {
    baseSatLayer.setVisible(true);
    baseRoadLayer.setVisible(false);
  } else {
    baseSatLayer.setVisible(false);
    baseRoadLayer.setVisible(true);
  }
}

// ==================== 줌 ====================
function zoomIn() {
  if (!olMap) return;
  var view = olMap.getView();
  view.animate({ zoom: view.getZoom() + 1, duration: 200 });
}
function zoomOut() {
  if (!olMap) return;
  var view = olMap.getView();
  view.animate({ zoom: view.getZoom() - 1, duration: 200 });
}

// ==================== 검색 ====================
function doSearch() {
  if (!kakaoGeocoder) { toast('지도 준비 중...', 'err'); return; }
  var query = document.getElementById('searchInput').value.trim();
  if (!query) { toast('검색어를 입력하세요', 'err'); return; }

  kakaoGeocoder.addressSearch(query, function(result, status) {
    if (status === kakao.maps.services.Status.OK && result[0]) {
      var lat = parseFloat(result[0].y), lng = parseFloat(result[0].x);
      moveToCoord(lng, lat, result[0].address_name || query);
    } else {
      var places = new kakao.maps.services.Places();
      places.keywordSearch(query, function(data, st) {
        if (st === kakao.maps.services.Status.OK && data[0]) {
          var lat = parseFloat(data[0].y), lng = parseFloat(data[0].x);
          moveToCoord(lng, lat, data[0].address_name || data[0].place_name || query);
        } else {
          toast('검색 결과 없음', 'err');
        }
      });
    }
  });
}

function moveToCoord(lng, lat, jibun) {
  currentLat = lat; currentLng = lng; selectedJibun = jibun;
  var view = olMap.getView();
  view.animate({
    center: ol.proj.fromLonLat([lng, lat]),
    zoom: 18,
    duration: 500
  });
  // 마커
  markerLayer.getSource().clear();
  var marker = new ol.Feature({ geometry: new ol.geom.Point(ol.proj.fromLonLat([lng, lat])) });
  markerLayer.getSource().addFeature(marker);
  setText('pinJibun', '📍 ' + jibun);
  setText('pinCoord', '위도 ' + lat.toFixed(6) + ' / 경도 ' + lng.toFixed(6));
  toast('✓ ' + jibun, 'ok');
  // 필지 하이라이트
  highlightParcel(lng, lat);
}

// ==================== 필지 하이라이트 (서버 WFS) ====================
function highlightParcel(lng, lat) {
  highlightLayer.getSource().clear();
  fetch(PROXY + '/api/wfs?lng=' + lng + '&lat=' + lat)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data && data.features && data.features.length > 0) {
        var format = new ol.format.GeoJSON();
        var features = format.readFeatures(data, {
          featureProjection: 'EPSG:3857',
          dataProjection: 'EPSG:4326'
        });
        highlightLayer.getSource().addFeatures(features);
      }
    })
    .catch(function(err){ console.warn('하이라이트 실패:', err); });
}

// ==================== 캡처 ====================
function captureMap(format) {
  format = format || 'png';
  toast('📷 캡처 중...');
  var target = document.querySelector('.map-wrap');
  if (!target) { toast('캡처 대상 없음', 'err'); return; }

  // OpenLayers 강제 렌더 후 캡처
  olMap.once('rendercomplete', function() {
    html2canvas(target, {
      useCORS: true,
      allowTaint: true,
      logging: false,
      backgroundColor: null,
      scale: 1.5
    }).then(function(canvas) {
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        var ts = new Date();
        var pad = function(n){return String(n).padStart(2,'0');};
        var jibunPart = selectedJibun ? selectedJibun.replace(/\s+/g, '_').substring(0, 25) : 'map';
        var fname = 'GDSP_' + jibunPart + '_' +
          ts.getFullYear() + pad(ts.getMonth()+1) + pad(ts.getDate()) + '_' +
          pad(ts.getHours()) + pad(ts.getMinutes()) + '.' + format;
        a.href = url; a.download = fname;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
        toast('✓ ' + format.toUpperCase() + ' 다운로드 완료', 'ok');
      }, format === 'jpg' ? 'image/jpeg' : 'image/png', format === 'jpg' ? 0.92 : 1.0);
    }).catch(function(err) {
      console.error('캡처 실패:', err);
      toast('캡처 실패', 'err');
    });
  });
  olMap.renderSync();
}

// ==================== 국가유산청 GIS ====================
function openHeritageGIS() {
  var copyText = selectedJibun || (currentLat.toFixed(6) + ', ' + currentLng.toFixed(6));
  if (navigator.clipboard) {
    navigator.clipboard.writeText(copyText).then(function(){
      toast('📋 ' + copyText + ' 복사됨', 'ok');
    });
  }
  window.open('https://gis-heritage.go.kr/newMap.do', '_blank', 'width=1400,height=900,scrollbars=yes,resizable=yes');
}

// ==================== 컨텍스트 메뉴 액션 ====================
function ctxAction(action) {
  document.getElementById('ctxMenu').classList.remove('show');
  if (action === 'copy_jibun') {
    if (contextJibun && navigator.clipboard) {
      navigator.clipboard.writeText(contextJibun);
      toast('📋 ' + contextJibun, 'ok');
    } else { toast('주소 없음', 'err'); }
  } else if (action === 'copy_coord') {
    var c = contextLat.toFixed(6) + ', ' + contextLng.toFixed(6);
    if (navigator.clipboard) {
      navigator.clipboard.writeText(c);
      toast('📋 ' + c, 'ok');
    }
  } else if (action === 'open_heritage') {
    if (navigator.clipboard) navigator.clipboard.writeText(contextJibun || (contextLat + ', ' + contextLng));
    window.open('https://gis-heritage.go.kr/newMap.do', '_blank', 'width=1400,height=900');
  } else if (action === 'open_naver') {
    window.open('https://map.naver.com/p?c=' + contextLng + ',' + contextLat + ',17,0,0,0,dh', '_blank');
  } else if (action === 'open_eum') {
    if (contextJibun) {
      window.open('https://www.eum.go.kr/web/ar/lu/luLandDet.jsp?addr=' + encodeURIComponent(contextJibun), '_blank');
    } else { toast('주소 없음', 'err'); }
  }
}

// ==================== 유틸 ====================
function setText(id, text) {
  var el = document.getElementById(id);
  if (el) el.textContent = text;
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function(){ t.className = 'toast'; }, 2500);
}

// ==================== 시작 ====================
window.addEventListener('DOMContentLoaded', initMap);
</script>
