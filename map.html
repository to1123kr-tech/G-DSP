<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-DSP 지도 — 화성시 GIS 스타일</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=0f432d6e8470eed32f947e3c7db146b9&libraries=services"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#0d1018; --panel:#13182a; --text:#e6eaf2; --muted:#8a93a8;
  --line:rgba(255,255,255,0.08); --accent:#36cfc9; --gold:#ffd166;
  --red:#ff4757; --orange:#ff9f43; --yellow:#ffd166; --green:#06d6a0;
  --purple:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Pretendard','Malgun Gothic',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}

/* 상단바 */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(19,24,42,0.95);border-bottom:1px solid var(--line);flex-shrink:0;z-index:100}
.logo{font-weight:700;font-size:18px;color:var(--accent);letter-spacing:-0.5px}
.logo .ver{font-size:9px;color:var(--gold);background:rgba(255,209,102,0.15);padding:1px 4px;border-radius:3px;margin-left:2px;font-weight:500}
.search-box{flex:1;display:flex;gap:6px;max-width:600px}
.search-input{flex:1;padding:7px 12px;background:#1a2034;border:1px solid var(--line);border-radius:6px;color:var(--text);font-size:13px}
.search-input:focus{outline:none;border-color:var(--accent)}
.btn{padding:7px 14px;background:var(--accent);border:none;border-radius:6px;color:#000;font-weight:600;cursor:pointer;font-size:13px}
.btn:hover{filter:brightness(1.1)}
.tools{display:flex;gap:6px;flex-wrap:wrap}
.tool-btn{padding:7px 12px;background:#1a2034;border:1px solid var(--line);border-radius:6px;color:var(--text);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px}
.tool-btn:hover{background:#252b48;border-color:var(--accent)}
.tool-btn.heritage{background:#8b1e3f;border-color:#8b1e3f;color:#fff}
.tool-btn.heritage:hover{background:#a52450}

/* 본문 */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* 좌측 패널 */
.sidebar{width:240px;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;flex-shrink:0;padding:10px}
.sec{margin-bottom:14px}
.sec-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;padding-left:4px}
.row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;margin-bottom:2px}
.row:hover{background:rgba(255,255,255,0.04)}
.label{font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.red{background:var(--red)} .dot.orange{background:var(--orange)}
.dot.yellow{background:var(--yellow)} .dot.green{background:var(--green)}
.dot.purple{background:var(--purple)}

/* 토글 스위치 */
.tog{position:relative;width:36px;height:20px;flex-shrink:0;cursor:pointer}
.tog input{opacity:0;width:0;height:0}
.tog .slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#2a3050;border-radius:20px;transition:0.2s}
.tog .slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:0.2s}
.tog input:checked+.slider{background:var(--accent)}
.tog input:checked+.slider:before{transform:translateX(16px)}

/* 지도 영역 */
.map-wrap{flex:1;position:relative;overflow:hidden}
#kakaoMap{position:absolute;inset:0;width:100%;height:100%;background:#1a1f30}

/* 지도 내부 컨트롤 */
.map-info{position:absolute;bottom:14px;left:14px;background:rgba(13,16,24,0.92);padding:10px 14px;border-radius:8px;font-size:12px;color:var(--text);max-width:380px;z-index:50;border:1px solid var(--line);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.map-info .pin-jibun{color:var(--gold);font-weight:600;font-size:13px}
.map-info .pin-coord{color:var(--muted);font-size:11px;margin-top:2px}

.map-zoom{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:4px;z-index:50}
.map-zoom button{width:36px;height:36px;background:rgba(13,16,24,0.92);border:1px solid var(--line);border-radius:6px;color:var(--text);cursor:pointer;font-size:18px;font-weight:700}
.map-zoom button:hover{background:#252b48;border-color:var(--accent)}

.map-type{position:absolute;top:14px;left:14px;display:flex;gap:0;z-index:50;background:rgba(13,16,24,0.92);border-radius:8px;border:1px solid var(--line);overflow:hidden}
.map-type button{padding:8px 14px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:12px}
.map-type button.on{background:var(--accent);color:#000;font-weight:600}

/* 토스트 */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:10px 20px;background:rgba(13,16,24,0.95);border:1px solid var(--accent);border-radius:8px;color:var(--text);font-size:13px;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.3s}
.toast.show{opacity:1}
.toast.err{border-color:var(--red)}
.toast.ok{border-color:var(--green)}

/* 워터마크 */
.watermark{position:absolute;bottom:14px;right:14px;color:rgba(255,255,255,0.3);font-size:10px;z-index:50;pointer-events:none}

/* 로딩 */
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,16,24,0.95);padding:20px 30px;border-radius:8px;color:var(--text);font-size:13px;z-index:200;display:none;border:1px solid var(--accent)}
.loading.show{display:block}

/* 컨텍스트 메뉴 */
.ctx-menu{position:fixed;background:rgba(13,16,24,0.97);border:1px solid var(--line);border-radius:8px;padding:6px;z-index:500;display:none;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.ctx-menu.show{display:block}
.ctx-item{padding:8px 14px;color:var(--text);cursor:pointer;font-size:13px;border-radius:4px}
.ctx-item:hover{background:var(--accent);color:#000}
.ctx-divider{height:1px;background:var(--line);margin:4px 0}

/* 스크롤바 */
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:#252b48;border-radius:3px}
.sidebar::-webkit-scrollbar-thumb:hover{background:#36cfc9}

@media (max-width: 768px) {
  .sidebar{width:200px}
  .tool-btn{padding:6px 8px;font-size:11px}
}
</style>
</head>
<body>

<!-- 상단바 -->
<div class="topbar">
  <div class="logo">G-DSP <span class="ver">v3</span></div>
  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="지번 입력 (예: 봉담읍 와우리 597, 화성시 남양읍 ...)" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn" onclick="doSearch()">검색</button>
  </div>
  <div class="tools">
    <button class="tool-btn" onclick="captureMap('png')" title="화면 PNG 다운">📷 PNG</button>
    <button class="tool-btn" onclick="captureMap('jpg')" title="화면 JPG 다운">📷 JPG</button>
    <button class="tool-btn heritage" onclick="openHeritageGIS()" title="국가유산청 보존관리지도">🏛 국가유산청</button>
    <button class="tool-btn" onclick="window.close()">✕ 닫기</button>
  </div>
</div>

<!-- 본문 -->
<div class="main">
  <!-- 좌측 패널 -->
  <div class="sidebar">
    <!-- 기본 -->
    <div class="sec">
      <div class="sec-title">기본 레이어</div>
      <div class="row">
        <div class="label">🗺 위성사진</div>
        <label class="tog"><input type="checkbox" id="chkSat" checked onchange="toggleMapType('skyview', this.checked)"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="label">🛣 도로명/지명</div>
        <label class="tog"><input type="checkbox" id="chkHybrid" checked onchange="toggleHybrid(this.checked)"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="label">📐 지적선+지번</div>
        <label class="tog"><input type="checkbox" id="chkCadastral" checked onchange="toggleCadastral(this.checked)"><span class="slider"></span></label>
      </div>
    </div>

    <!-- 토지정보 -->
    <div class="sec">
      <div class="sec-title">🏘 토지정보</div>
      <div class="row">
        <div class="label">용도지역</div>
        <label class="tog"><input type="checkbox" id="chkZoneUse" onchange="toggleVwLayer('zone_use', this.checked)"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="label">지구단위계획</div>
        <label class="tog"><input type="checkbox" id="chkDistPlan" onchange="toggleVwLayer('dist_plan', this.checked)"><span class="slider"></span></label>
      </div>
    </div>

    <!-- 환경등급 -->
    <div class="sec">
      <div class="sec-title">🌳 환경등급 (생태자연도)</div>
      <div class="row">
        <div class="label"><span class="dot red"></span>1등급</div>
        <label class="tog"><input type="checkbox" id="chkEco1" onchange="toggleVwLayer('eco1', this.checked)"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="label"><span class="dot orange"></span>2등급</div>
        <label class="tog"><input type="checkbox" id="chkEco2" onchange="toggleVwLayer('eco2', this.checked)"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="label"><span class="dot yellow"></span>3등급</div>
        <label class="tog"><input type="checkbox" id="chkEco3" onchange="toggleVwLayer('eco3', this.checked)"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="label"><span class="dot green"></span>별도관리</div>
        <label class="tog"><input type="checkbox" id="chkEco4" onchange="toggleVwLayer('eco4', this.checked)"><span class="slider"></span></label>
      </div>
    </div>

    <!-- 문화재 -->
    <div class="sec">
      <div class="sec-title">🏛 문화재 (허가검토용)</div>
      <div class="row">
        <div class="label"><span class="dot red"></span>보호구역</div>
        <label class="tog"><input type="checkbox" id="chkHer1" onchange="toggleVwLayer('her1', this.checked)"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="label"><span class="dot orange"></span>영향검토</div>
        <label class="tog"><input type="checkbox" id="chkHer2" onchange="toggleVwLayer('her2', this.checked)"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="label"><span class="dot yellow"></span>영향평가</div>
        <label class="tog"><input type="checkbox" id="chkHer3" onchange="toggleVwLayer('her3', this.checked)"><span class="slider"></span></label>
      </div>
    </div>

    <!-- 지형 -->
    <div class="sec">
      <div class="sec-title">📐 지형정보</div>
      <div class="row">
        <div class="label">등고선</div>
        <label class="tog"><input type="checkbox" id="chkContour" onchange="toggleVwLayer('contour', this.checked)"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div class="label">표고점</div>
        <label class="tog"><input type="checkbox" id="chkElev" onchange="toggleVwLayer('elev', this.checked)"><span class="slider"></span></label>
      </div>
    </div>
  </div>

  <!-- 지도 영역 -->
  <div class="map-wrap">
    <div id="kakaoMap"></div>

    <!-- 지도 타입 전환 -->
    <div class="map-type">
      <button id="btnSkyview" class="on" onclick="setMapType('skyview', this)">위성</button>
      <button id="btnHybrid" onclick="setMapType('hybrid', this)">위성+지명</button>
      <button id="btnNormal" onclick="setMapType('normal', this)">일반</button>
    </div>

    <!-- 줌 컨트롤 -->
    <div class="map-zoom">
      <button onclick="zoomIn()" title="확대">+</button>
      <button onclick="zoomOut()" title="축소">−</button>
    </div>

    <!-- 정보 표시 -->
    <div class="map-info" id="mapInfo">
      <div class="pin-jibun" id="pinJibun">지도 클릭 시 필지 정보 표시</div>
      <div class="pin-coord" id="pinCoord">화성시 남양읍 (기본 위치)</div>
    </div>

    <!-- 워터마크 -->
    <div class="watermark">G-DSP © 2026 · 측정값은 참고용</div>

    <!-- 로딩 -->
    <div class="loading" id="loading">⏳ 로딩 중...</div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 컨텍스트 메뉴 -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxAction('copy_jibun')">📋 지번 복사</div>
  <div class="ctx-item" onclick="ctxAction('copy_coord')">📋 좌표 복사</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" onclick="ctxAction('open_heritage')">🏛 국가유산청 GIS</div>
  <div class="ctx-item" onclick="ctxAction('open_naver')">🗺 네이버 지도</div>
  <div class="ctx-item" onclick="ctxAction('open_eum')">📋 토지이음</div>
</div>

<script>
// ==================== 설정 ====================
var _proto = (window.location.protocol === 'https:' ? 'https:' : 'http:');
var _host = window.location.hostname;
var PROXY = (_host.indexOf('nip.io') > -1 || _host === '168-107-15-68.nip.io')
  ? _proto + '//' + _host
  : (window.location.protocol === 'https:' ? 'https://168.107.15.68:5050' : 'http://168.107.15.68:5050');
var VWORLD_KEY = localStorage.getItem('gdsp_vworld') || localStorage.getItem('gdsp_vworld_key') || '';

// ==================== 상태 ====================
var kakaoMap = null;
var kakaoMarker = null;
var kakaoGeocoder = null;
var currentMapType = 'skyview';
var currentLat = 37.2055, currentLng = 126.8317;
var selectedJibun = '', selectedPnu = '';
var contextLat = 0, contextLng = 0, contextJibun = '';

// VWorld 오버레이 관리
var vwOverlays = {};
var vwTilesetUrls = {
  cadastral: 'lt_c_landinfobasemap',
  zone_use: 'lt_c_uq111',
  dist_plan: 'lt_c_uq121',
  eco1: 'lt_c_ue901',
  eco2: 'lt_c_ue902',
  eco3: 'lt_c_ue903',
  eco4: 'lt_c_ue904',
  her1: 'lt_c_ud801',
  her2: 'lt_c_ud802',
  her3: 'lt_c_ud810',
  contour: 'CONTOUR',
  elev: 'ELEV'
};
var vwNames = {
  cadastral: '지적선+지번',
  zone_use: '용도지역',
  dist_plan: '지구단위계획',
  eco1: '환경 1등급',
  eco2: '환경 2등급',
  eco3: '환경 3등급',
  eco4: '환경 별도관리',
  her1: '문화재 보호구역',
  her2: '문화재 영향검토',
  her3: '문화재 영향평가',
  contour: '등고선',
  elev: '표고점'
};


// ==================== 선택/우클릭/레이어 보조 ====================
var selectedPolygon = null;
var lastCtxClientX = 0, lastCtxClientY = 0;

function buildPnuFromAddress(addr, jibun) {
  if (!addr || !addr.b_code) return '';
  var mainNo = parseInt(addr.main_address_no || '0', 10) || 0;
  var subNo = parseInt(addr.sub_address_no || '0', 10) || 0;
  var platGb = (jibun && /(^|\s)산\s*\d+/.test(jibun)) ? '2' : '1';
  return addr.b_code + platGb + String(mainNo).padStart(4, '0') + String(subNo).padStart(4, '0');
}

function drawSelectedPolygon(coords) {
  if (!kakaoMap || !coords || !coords.length) return;
  if (selectedPolygon) selectedPolygon.setMap(null);
  var path = coords.map(function(c){ return new kakao.maps.LatLng(c[1], c[0]); });
  selectedPolygon = new kakao.maps.Polygon({
    path: path,
    strokeWeight: 4,
    strokeColor: '#00ff88',
    strokeOpacity: 1,
    strokeStyle: 'solid',
    fillColor: '#00ff88',
    fillOpacity: 0.18,
    zIndex: 50
  });
  selectedPolygon.setMap(kakaoMap);
}

function highlightParcelByPnu(pnu) {
  if (!pnu || !PROXY) return;
  fetch(PROXY + '/api/wfs?pnu=' + encodeURIComponent(pnu) + '&lng=' + currentLng + '&lat=' + currentLat)
    .then(function(r){ return r.json(); })
    .then(function(d){
      var f = d && d.features && d.features[0];
      if (!f || !f.geometry) return;
      var g = f.geometry, coords = null;
      if (g.type === 'Polygon') coords = g.coordinates && g.coordinates[0];
      if (g.type === 'MultiPolygon') coords = g.coordinates && g.coordinates[0] && g.coordinates[0][0];
      if (coords) drawSelectedPolygon(coords);
    })
    .catch(function(){ /* 선택 테두리 실패는 무시 */ });
}

function placeContextMenu(x, y) {
  var menu = document.getElementById('ctxMenu');
  if (!menu) return;
  menu.style.left = '0px';
  menu.style.top = '0px';
  menu.classList.add('show');
  var w = menu.offsetWidth || 180;
  var h = menu.offsetHeight || 220;
  var nx = Math.min(Math.max(8, x), window.innerWidth - w - 8);
  var ny = Math.min(Math.max(8, y), window.innerHeight - h - 8);
  menu.style.left = nx + 'px';
  menu.style.top = ny + 'px';
}

function keepCadastralOnTop() {
  var chk = document.getElementById('chkCadastral');
  if (!kakaoMap || !chk || !chk.checked) return;
  try { kakaoMap.removeOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT); } catch(e) {}
  try { kakaoMap.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT); } catch(e) {}
}

function toggleCadastral(on) {
  if (!kakaoMap) return;
  try {
    if (on) {
      kakaoMap.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
      toast('지적선+지번 ON', 'ok');
    } else {
      kakaoMap.removeOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
      toast('지적선+지번 OFF');
    }
  } catch(e) {}
}

// ==================== 카카오 지도 초기화 ====================
function initKakaoMap() {
  if (!window.kakao || !window.kakao.maps) {
    setTimeout(initKakaoMap, 200);
    return;
  }
  var container = document.getElementById('kakaoMap');
  var options = {
    center: new kakao.maps.LatLng(currentLat, currentLng),
    level: 3,
    mapTypeId: kakao.maps.MapTypeId.SKYVIEW
  };
  kakaoMap = new kakao.maps.Map(container, options);
  kakaoMap.addOverlayMapTypeId(kakao.maps.MapTypeId.HYBRID);
  kakaoMap.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);

  kakaoGeocoder = new kakao.maps.services.Geocoder();
  kakaoMarker = new kakao.maps.Marker({position: new kakao.maps.LatLng(currentLat, currentLng), map: null});

  // 좌클릭: 필지 정보
  kakao.maps.event.addListener(kakaoMap, 'click', function(e) {
    var latLng = e.latLng;
    var lat = latLng.getLat(), lng = latLng.getLng();
    kakaoMarker.setPosition(latLng);
    kakaoMarker.setMap(kakaoMap);
    setText('pinJibun', '⏳ 조회 중...');
    setText('pinCoord', '위도 ' + lat.toFixed(6) + ' / 경도 ' + lng.toFixed(6));

    kakaoGeocoder.coord2Address(lng, lat, function(result, status) {
      if (status === kakao.maps.services.Status.OK && result[0] && result[0].address) {
        var addr = result[0].address;
        var jibun = addr.address_name || '';
        selectedJibun = jibun;
        selectedPnu = buildPnuFromAddress(addr, jibun);
        currentLat = lat; currentLng = lng;
        setText('pinJibun', '📍 ' + jibun);
        setText('pinCoord', '위도 ' + lat.toFixed(6) + ' / 경도 ' + lng.toFixed(6));
        if (selectedPnu) highlightParcelByPnu(selectedPnu);
        toast('✓ ' + jibun, 'ok');
      } else {
        setText('pinJibun', '주소 없음');
      }
    });
  });

  // 우클릭 마우스 좌표 저장: 메뉴가 실제 우클릭 위치에 뜨도록 보정
  container.addEventListener('contextmenu', function(ev) {
    ev.preventDefault();
    lastCtxClientX = ev.clientX;
    lastCtxClientY = ev.clientY;
  }, true);

  // 우클릭: 컨텍스트 메뉴
  kakao.maps.event.addListener(kakaoMap, 'rightclick', function(e) {
    contextLat = e.latLng.getLat();
    contextLng = e.latLng.getLng();
    kakaoGeocoder.coord2Address(contextLng, contextLat, function(result, status) {
      if (status === kakao.maps.services.Status.OK && result[0] && result[0].address) {
        contextJibun = result[0].address.address_name || '';
      }
      placeContextMenu(lastCtxClientX || (window.innerWidth/2), lastCtxClientY || (window.innerHeight/2));
    });
  });

  // 메뉴 내부 클릭은 닫힘 방지, 바깥 클릭만 닫기
  document.getElementById('ctxMenu').addEventListener('click', function(ev){ ev.stopPropagation(); });
  document.addEventListener('click', function() {
    document.getElementById('ctxMenu').classList.remove('show');
  });

  // 줌 변경 시 VWorld 오버레이 자동 갱신
  kakao.maps.event.addListener(kakaoMap, 'zoom_changed', refreshVwOverlays);
  kakao.maps.event.addListener(kakaoMap, 'dragend', refreshVwOverlays);

  // 기본 지적선+지번은 카카오 지적편집도로 즉시 표시
  setTimeout(function() { toggleCadastral(true); }, 300);

  toast('✓ 지도 준비 완료', 'ok');
}

// ==================== VWorld 오버레이 (CustomOverlay 방식) ====================
// 카카오 SDK는 외부 WMS 직접 지원 안 함 → 타일 이미지를 CustomOverlay로 합성
function toggleVwLayer(type, on) {
  if (!kakaoMap) return;
  var layerName = vwTilesetUrls[type];
  if (!layerName) return;

  if (on) {
    if (vwOverlays[type]) {
      // 이미 있으면 다시 표시
      vwOverlays[type].forEach(function(o) { o.setMap(kakaoMap); });
    } else {
      // 새로 생성
      vwOverlays[type] = [];
      addVwTileOverlay(type, layerName);
    }
    toast(vwNames[type] + ' ON', 'ok');
  } else {
    if (vwOverlays[type]) {
      vwOverlays[type].forEach(function(o) { o.setMap(null); });
      vwOverlays[type] = null;
    }
    toast(vwNames[type] + ' OFF');
  }
}

// 카카오 영역에 VWorld WMS 타일 그리기 (CustomOverlay)
function addVwTileOverlay(type, layerName) {
  if (!kakaoMap) return;
  var bounds = kakaoMap.getBounds();
  var sw = bounds.getSouthWest();
  var ne = bounds.getNorthEast();

  // 타일 이미지 URL (서버 프록시 경유)
  var url;
  if (type === 'contour' || type === 'elev') {
    // NGII 바로e맵 (등고선/표고점 포함)
    var level = kakaoMap.getLevel();
    // 레벨 변환은 복잡하므로 일단 WMS 방식 시도
    url = PROXY + '/api/vw-wms?LAYERS=' + layerName +
      '&FORMAT=image/png&TRANSPARENT=true' +
      '&SRS=EPSG:4326&WIDTH=1024&HEIGHT=1024' +
      '&BBOX=' + sw.getLng() + ',' + sw.getLat() + ',' + ne.getLng() + ',' + ne.getLat() +
      '&SERVICE=WMS&REQUEST=GetMap&VERSION=1.1.1&t=' + Date.now();
  } else {
    // VWorld WMS
    url = PROXY + '/api/vw-wms?LAYERS=' + layerName +
      '&STYLES=' + layerName +
      '&FORMAT=image/png&TRANSPARENT=true' +
      '&SRS=EPSG:4326&WIDTH=1024&HEIGHT=1024' +
      '&BBOX=' + sw.getLng() + ',' + sw.getLat() + ',' + ne.getLng() + ',' + ne.getLat() +
      '&SERVICE=WMS&REQUEST=GetMap&VERSION=1.1.1';
  }

  // CustomOverlay로 배치
  var content = document.createElement('img');
  content.src = url;
  content.style.cssText = 'pointer-events:none;mix-blend-mode:' +
    (type === 'cadastral' ? 'normal' : 'multiply') +
    ';opacity:' + (type === 'cadastral' ? '0.95' : '0.6') +
    ';width:100%;height:100%';
  content.crossOrigin = 'anonymous';
  content.onerror = function() { /* 무시 */ };

  // 영역 좌상/우하 좌표로 div 배치 (kakao 영역에 맞춤)
  var overlay = new kakao.maps.CustomOverlay({
    map: kakaoMap,
    position: new kakao.maps.LatLng((sw.getLat()+ne.getLat())/2, (sw.getLng()+ne.getLng())/2),
    content: '<div></div>', // placeholder - 진짜 그림은 다른 방식 사용
    xAnchor: 0.5,
    yAnchor: 0.5,
    zIndex: type === 'cadastral' ? 5 : 3
  });

  // 실제로는 카카오의 OverlayMapType 방식을 사용하는 것이 더 정석
  // → addOverlayMapTypeId 와 비슷한 사용자 정의 타일 레이어 만들기
  if (!vwOverlays[type]) vwOverlays[type] = [];

  // 카카오 SDK의 정식 방식: TileLayer-like overlay 사용
  var customTileLayer = createCustomTileLayer(layerName, type);
  if (customTileLayer) {
    kakaoMap.addOverlayMapTypeId(customTileLayer);
    vwOverlays[type].push({ setMap: function(m) {
      if (m) kakaoMap.addOverlayMapTypeId(customTileLayer);
      else kakaoMap.removeOverlayMapTypeId(customTileLayer);
    }, _isCustom: true, _id: customTileLayer });
  }
}

// 카카오 SDK는 OverlayMapType.LAYER_TYPE을 직접 만들 수는 없으므로
// 대신 CustomOverlay를 격자로 배치하는 방식 사용
function createCustomTileLayer(layerName, type) {
  // 더미 - 실제 구현은 아래 redrawVwOverlay 사용
  return null;
}

// ==================== VWorld 오버레이 - 격자 타일 방식 ====================
// 카카오 SDK 위에 256x256 픽셀 단위로 타일 합성
function redrawVwOverlay(type, layerName) {
  if (!kakaoMap) return;

  // 기존 오버레이 제거
  if (vwOverlays[type] && vwOverlays[type].forEach) {
    vwOverlays[type].forEach(function(o) { if (o.setMap) o.setMap(null); });
  }
  vwOverlays[type] = [];

  // 현재 영역과 줌 레벨로 타일 그리드 계산
  var bounds = kakaoMap.getBounds();
  var sw = bounds.getSouthWest();
  var ne = bounds.getNorthEast();
  var level = kakaoMap.getLevel(); // 카카오: 1(가까움) ~ 14(멀리)

  // 카카오 level → 표준 zoom 변환 (대략)
  var zoom = 19 - level;
  if (zoom < 12) zoom = 12; if (zoom > 19) zoom = 19;

  // 한 번에 한 큰 이미지 호출 (간단)
  var url;
  if (type === 'contour' || type === 'elev') {
    // NGII는 별도 처리 (WMTS) - 일단 VWorld WMS와 동일 방식 시도
    url = PROXY + '/api/vw-wms?LAYERS=' + layerName +
      '&FORMAT=image/png&TRANSPARENT=true' +
      '&SRS=EPSG:4326&WIDTH=1024&HEIGHT=1024' +
      '&BBOX=' + sw.getLng() + ',' + sw.getLat() + ',' + ne.getLng() + ',' + ne.getLat() +
      '&SERVICE=WMS&REQUEST=GetMap&VERSION=1.1.1';
  } else {
    url = PROXY + '/api/vw-wms?LAYERS=' + layerName +
      '&STYLES=' + layerName +
      '&FORMAT=image/png&TRANSPARENT=true' +
      '&SRS=EPSG:4326&WIDTH=1024&HEIGHT=1024' +
      '&BBOX=' + sw.getLng() + ',' + sw.getLat() + ',' + ne.getLng() + ',' + ne.getLat() +
      '&SERVICE=WMS&REQUEST=GetMap&VERSION=1.1.1';
  }

  // 카카오 영역 전체에 이미지 합성 (CustomOverlay 4개 점으로 위치 지정)
  var mapEl = document.getElementById('kakaoMap');
  var w = mapEl ? mapEl.clientWidth : 1024;
  var h = mapEl ? mapEl.clientHeight : 768;
  var opMap = { zone_use:0.34, dist_plan:0.42, eco1:0.45, eco2:0.42, eco3:0.38, eco4:0.42, her1:0.55, her2:0.48, her3:0.45, contour:0.70, elev:0.70 };
  var opacity = opMap[type] || 0.42;
  var blend = (type === 'contour' || type === 'elev' || type.indexOf('her') === 0) ? 'normal' : 'multiply';
  var imgHtml =
    '<div style="width:' + w + 'px;height:' + h + 'px;pointer-events:none;overflow:hidden">' +
    '  <img crossorigin="anonymous" src="' + url + '" style="display:block;width:100%;height:100%;' +
    '    pointer-events:none;mix-blend-mode:' + blend + ';opacity:' + opacity + '"/>' +
    '</div>';

  // 정확한 좌표 일치를 위해 카카오 표준 방식: setOverlayMapType 활용 불가능 (외부 URL 안됨)
  // → 우회: 큰 이미지 1장을 화면 전체에 깔기
  var overlay = new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng((sw.getLat()+ne.getLat())/2, (sw.getLng()+ne.getLng())/2),
    content: imgHtml,
    xAnchor: 0.5,
    yAnchor: 0.5,
    zIndex: 3,
    map: kakaoMap
  });

  vwOverlays[type].push(overlay);
}

// 줌/이동 시 오버레이 다시 그리기
function refreshVwOverlays() {
  Object.keys(vwOverlays).forEach(function(type) {
    if (vwOverlays[type] && vwOverlays[type].length > 0) {
      var layerName = vwTilesetUrls[type];
      if (layerName && type !== 'cadastral') redrawVwOverlay(type, layerName);
    }
  });
  setTimeout(keepCadastralOnTop, 50);
}

// 새 toggleVwLayer (간단한 redrawVwOverlay 사용)
window.toggleVwLayer = function(type, on) {
  if (!kakaoMap) {
    setTimeout(function(){ window.toggleVwLayer(type, on); }, 500);
    return;
  }
  if (type === 'cadastral') { toggleCadastral(on); return; }
  var layerName = vwTilesetUrls[type];
  if (!layerName) return;

  if (on) {
    redrawVwOverlay(type, layerName);
    keepCadastralOnTop();
    toast(vwNames[type] + ' ON', 'ok');
  } else {
    if (vwOverlays[type] && vwOverlays[type].forEach) {
      vwOverlays[type].forEach(function(o) { if (o.setMap) o.setMap(null); });
      vwOverlays[type] = [];
    }
    toast(vwNames[type] + ' OFF');
  }
};

// ==================== 지도 타입 전환 ====================
function setMapType(type, btn) {
  if (!kakaoMap) return;
  document.querySelectorAll('.map-type button').forEach(function(b){b.classList.remove('on')});
  if (btn) btn.classList.add('on');
  currentMapType = type;
  if (type === 'normal') {
    kakaoMap.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
    kakaoMap.removeOverlayMapTypeId(kakao.maps.MapTypeId.HYBRID);
  } else if (type === 'skyview') {
    kakaoMap.setMapTypeId(kakao.maps.MapTypeId.SKYVIEW);
    kakaoMap.removeOverlayMapTypeId(kakao.maps.MapTypeId.HYBRID);
  } else if (type === 'hybrid') {
    kakaoMap.setMapTypeId(kakao.maps.MapTypeId.SKYVIEW);
    kakaoMap.addOverlayMapTypeId(kakao.maps.MapTypeId.HYBRID);
  }
  // 좌측 토글도 동기화
  document.getElementById('chkSat').checked = (type !== 'normal');
  document.getElementById('chkHybrid').checked = (type === 'hybrid');
  setTimeout(keepCadastralOnTop, 50);
}

function toggleMapType(type, on) {
  if (!kakaoMap) return;
  if (on) {
    kakaoMap.setMapTypeId(kakao.maps.MapTypeId.SKYVIEW);
    if (document.getElementById('chkHybrid').checked) {
      kakaoMap.addOverlayMapTypeId(kakao.maps.MapTypeId.HYBRID);
    }
  } else {
    kakaoMap.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
    kakaoMap.removeOverlayMapTypeId(kakao.maps.MapTypeId.HYBRID);
  }
}

function toggleHybrid(on) {
  if (!kakaoMap) return;
  if (on) kakaoMap.addOverlayMapTypeId(kakao.maps.MapTypeId.HYBRID);
  else kakaoMap.removeOverlayMapTypeId(kakao.maps.MapTypeId.HYBRID);
  setTimeout(keepCadastralOnTop, 50);
}

// ==================== 줌 ====================
function zoomIn() {
  if (!kakaoMap) return;
  var lv = kakaoMap.getLevel();
  if (lv > 1) kakaoMap.setLevel(lv - 1);
}
function zoomOut() {
  if (!kakaoMap) return;
  var lv = kakaoMap.getLevel();
  if (lv < 14) kakaoMap.setLevel(lv + 1);
}

// ==================== 지번 검색 ====================
function doSearch() {
  if (!kakaoGeocoder) { toast('지도 준비 중...', 'err'); return; }
  var query = document.getElementById('searchInput').value.trim();
  if (!query) { toast('검색어를 입력하세요', 'err'); return; }

  // 1. 주소 검색
  kakaoGeocoder.addressSearch(query, function(result, status) {
    if (status === kakao.maps.services.Status.OK && result[0]) {
      var lat = parseFloat(result[0].y), lng = parseFloat(result[0].x);
      var pos = new kakao.maps.LatLng(lat, lng);
      kakaoMap.setCenter(pos);
      kakaoMap.setLevel(2);
      kakaoMarker.setPosition(pos);
      kakaoMarker.setMap(kakaoMap);
      currentLat = lat; currentLng = lng;
      selectedJibun = result[0].address_name || query;
      selectedPnu = result[0].address ? buildPnuFromAddress(result[0].address, selectedJibun) : '';
      if (selectedPnu) highlightParcelByPnu(selectedPnu);
      setText('pinJibun', '📍 ' + selectedJibun);
      setText('pinCoord', '위도 ' + lat.toFixed(6) + ' / 경도 ' + lng.toFixed(6));
      toast('✓ ' + selectedJibun, 'ok');
      // VWorld 오버레이 갱신
      setTimeout(refreshVwOverlays, 300);
    } else {
      // 키워드 검색 fallback
      var places = new kakao.maps.services.Places();
      places.keywordSearch(query, function(data, st) {
        if (st === kakao.maps.services.Status.OK && data[0]) {
          var lat = parseFloat(data[0].y), lng = parseFloat(data[0].x);
          var pos = new kakao.maps.LatLng(lat, lng);
          kakaoMap.setCenter(pos);
          kakaoMap.setLevel(2);
          kakaoMarker.setPosition(pos);
          kakaoMarker.setMap(kakaoMap);
          currentLat = lat; currentLng = lng;
          selectedJibun = data[0].address_name || data[0].place_name || query;
          setText('pinJibun', '📍 ' + selectedJibun);
          setText('pinCoord', '위도 ' + lat.toFixed(6) + ' / 경도 ' + lng.toFixed(6));
          toast('✓ ' + selectedJibun, 'ok');
          setTimeout(refreshVwOverlays, 300);
        } else {
          toast('검색 결과 없음', 'err');
        }
      });
    }
  });
}

// ==================== 화면 캡처 ====================
function captureMap(format) {
  format = format || 'png';
  toast('📷 캡처 중...');
  var target = document.querySelector('.map-wrap');
  if (!target) { toast('캡처 대상 없음', 'err'); return; }

  html2canvas(target, {
    useCORS: true,
    allowTaint: true,
    logging: false,
    backgroundColor: null,
    scale: 1.5
  }).then(function(canvas) {
    canvas.toBlob(function(blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      var ts = new Date();
      var pad = function(n){return String(n).padStart(2,'0');};
      var jibunPart = selectedJibun ? selectedJibun.replace(/\s+/g, '_').substring(0, 20) : 'map';
      var fname = 'GDSP_' + jibunPart + '_' +
        ts.getFullYear() + pad(ts.getMonth()+1) + pad(ts.getDate()) + '_' +
        pad(ts.getHours()) + pad(ts.getMinutes()) + '.' + format;
      a.href = url;
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
      toast('✓ ' + format.toUpperCase() + ' 다운로드 완료', 'ok');
    }, format === 'jpg' ? 'image/jpeg' : 'image/png', format === 'jpg' ? 0.92 : 1.0);
  }).catch(function(err) {
    console.error('캡처 실패:', err);
    toast('캡처 실패', 'err');
  });
}

// ==================== 국가유산청 GIS ====================
function openHeritageGIS() {
  // 좌표/주소 클립보드 복사
  var copyText = selectedJibun || (currentLat.toFixed(6) + ', ' + currentLng.toFixed(6));
  if (navigator.clipboard) {
    navigator.clipboard.writeText(copyText).then(function(){
      toast('📋 ' + copyText + ' 복사됨', 'ok');
    });
  }
  window.open('https://gis-heritage.go.kr/newMap.do', '_blank', 'width=1400,height=900,scrollbars=yes,resizable=yes');
}

// ==================== 컨텍스트 메뉴 액션 ====================
function ctxAction(action) {
  document.getElementById('ctxMenu').classList.remove('show');
  if (action === 'copy_jibun') {
    if (contextJibun && navigator.clipboard) {
      navigator.clipboard.writeText(contextJibun);
      toast('📋 ' + contextJibun + ' 복사', 'ok');
    }
  } else if (action === 'copy_coord') {
    var c = contextLat.toFixed(6) + ', ' + contextLng.toFixed(6);
    if (navigator.clipboard) {
      navigator.clipboard.writeText(c);
      toast('📋 ' + c + ' 복사', 'ok');
    }
  } else if (action === 'open_heritage') {
    if (navigator.clipboard) navigator.clipboard.writeText(contextJibun || (contextLat + ', ' + contextLng));
    window.open('https://gis-heritage.go.kr/newMap.do', '_blank', 'width=1400,height=900');
  } else if (action === 'open_naver') {
    window.open('https://map.naver.com/p?c=' + contextLng + ',' + contextLat + ',17,0,0,0,dh', '_blank');
  } else if (action === 'open_eum') {
    if (contextJibun) {
      window.open('https://www.eum.go.kr/web/ar/lu/luLandDet.jsp?addr=' + encodeURIComponent(contextJibun), '_blank');
    } else {
      toast('주소 정보 없음', 'err');
    }
  }
}

// ==================== 유틸리티 ====================
function setText(id, text) {
  var el = document.getElementById(id);
  if (el) el.textContent = text;
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function(){ t.className = 'toast'; }, 2500);
}

// ==================== 초기화 ====================
window.addEventListener('DOMContentLoaded', function() {
  initKakaoMap();

  // VWorld 키 가져오기 (필요 시)
  if (!VWORLD_KEY) {
    fetch(PROXY + '/api/vworld/key')
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.key) {
          VWORLD_KEY = d.key;
          localStorage.setItem('gdsp_vworld', d.key);
        }
      })
      .catch(function(){ /* 무시 */ });
  }
});
