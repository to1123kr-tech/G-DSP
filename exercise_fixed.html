
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운동 기록</title>

<style>
body{
font-family:Arial;
background:#0e0e0e;
color:white;
margin:0;
text-align:center;
}

header{
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
padding-bottom:90px;
}

button{
width:90%;
padding:14px;
margin:8px;
border:none;
border-radius:10px;
font-size:16px;
background:#2b2b2b;
color:white;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:black;
}

.bottom button{
flex:1;
margin:0;
border-radius:0;
font-size:14px;
}

.hidden{display:none}

.calendar{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#1c1c1c;
border-radius:12px;
width:85px;
margin:6px;
padding:8px;
}

.am{color:#4aa3ff}
.pm{color:#ff8c3a}

.dot{
height:8px;
width:8px;
border-radius:50%;
display:inline-block;
margin:2px;
}

.amdot{background:#4aa3ff}
.pmdot{background:#ff8c3a}

img{
width:95%;
border-radius:10px;
margin-top:8px;
}
</style>
</head>

<body>

<header>운동 기록</header>

<div class="container">

<div id="camera">
<h3>내사진 촬영</h3>
<input type="file" accept="image/*" capture="environment" id="cameraInput">
</div>

<div id="upload" class="hidden">
<h3>사진 업로드</h3>
<button onclick="selectType('run')">런닝 사진</button>
<button onclick="selectType('step')">걸음 캡처</button>
<input type="file" id="uploadInput" class="hidden" accept="image/*">
</div>

<div id="calendar" class="hidden">
<h3>달력</h3>
<div class="calendar" id="calendarGrid"></div>
</div>

<div id="settings" class="hidden">
<h3>설정</h3>
<input id="apikey" placeholder="API KEY 입력" style="width:90%;padding:10px">
<button onclick="saveKey()">저장</button>
<p id="keyInfo"></p>
</div>

</div>

<div class="bottom">
<button onclick="showTab('camera')">카메라</button>
<button onclick="showTab('upload')">업로드</button>
<button onclick="showTab('calendar')">달력</button>
<button onclick="showTab('settings')">설정</button>
</div>

<script>

let records={}
let uploadType=""

function showTab(id){

["camera","upload","calendar","settings"].forEach(t=>{
document.getElementById(t).classList.add("hidden")
})

document.getElementById(id).classList.remove("hidden")

if(id==="calendar") renderCalendar()

}

function today(){

let d=new Date()
return d.toISOString().split("T")[0]

}

function selectType(type){

uploadType=type
document.getElementById("uploadInput").click()

}

document.getElementById("cameraInput").onchange=function(){

let f=this.files[0]
if(!f) return

saveRun(f)

}

document.getElementById("uploadInput").onchange=function(){

let f=this.files[0]
if(!f) return

if(uploadType==="run") saveRun(f)
if(uploadType==="step") saveStep(f)

}

function saveRun(file){

let date=today()

if(!records[date]) records[date]={}

let min=prompt("운동 시간 (분) 입력")

if(!min) return

let hour=new Date().getHours()
let t=hour<12?"AM":"PM"

records[date][t]={
minutes:min,
img:URL.createObjectURL(file)
}

renderCalendar()

}

function saveStep(){

let date=today()

if(!records[date]) records[date]={}

records[date].step=true

renderCalendar()

}

function renderCalendar(){

let grid=document.getElementById("calendarGrid")
grid.innerHTML=""

for(let i=1;i<=30;i++){

let date="2026-03-"+String(i).padStart(2,"0")
let r=records[date]

let dots=""
let am="-"
let pm="-"

if(r){

if(r.AM){
dots+="<span class='dot amdot'></span>"
am=r.AM.minutes+"분"
}

if(r.PM){
dots+="<span class='dot pmdot'></span>"
pm=r.PM.minutes+"분"
}

}

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<b>${i}</b>
<div>${dots}</div>
<div class="am">AM ${am}</div>
<div class="pm">PM ${pm}</div>
`

grid.appendChild(card)

}

}

function saveKey(){

let k=document.getElementById("apikey").value

localStorage.setItem("api_key",k)

document.getElementById("keyInfo").innerText="저장됨"

}

</script>

</body>
</html>
