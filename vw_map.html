<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<style>
*{margin:0;padding:0}
html,body,#vmap{width:100%;height:100%;overflow:hidden}
#loadingCover{
  position:fixed;inset:0;z-index:99999;
  background:#1a1f2e;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  transition:opacity 0.4s;
  font-family:-apple-system,'Segoe UI',sans-serif;
}
#loadingCover.hide{opacity:0;pointer-events:none}
.spinner{
  width:40px;height:40px;
  border:3px solid rgba(255,255,255,.2);
  border-top-color:#4fc3f7;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.lbl{color:#aab;font-size:13px}
</style>
<script>
// URL 파라미터에서 키 먼저 읽기
var _params = new URLSearchParams(location.search);
var _apiKey = _params.get('key') || '';
// VWorld 스크립트를 document.write로 동기 로드 (vw.source.TileWMS 등이 정상 로드됨)
if (_apiKey) {
  document.write('<sc'+'ript src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey='+_apiKey+'"><\/sc'+'ript>');
}
</script>
</head><body>
<div id="vmap"></div>
<div id="loadingCover">
  <div class="spinner"></div>
  <div class="lbl">VWorld 지도 준비중...</div>
</div>
<script>
var lng = parseFloat(_params.get('lng')) || 126.83;
var lat = parseFloat(_params.get('lat')) || 37.20;
var map, jijukAdded = false, _jijukLayer = null, _parcelGeom = null;

window.addEventListener('load', function() {
  if (typeof vw === 'undefined') {
    document.body.innerHTML = '<div style="padding:20px;color:red;font-family:sans-serif">VWorld 스크립트 로드 실패 — API 키를 확인하세요.</div>';
    return;
  }
  initMap();
});

function initMap() {
  map = new vw.Map();
  map.setOption({
    mapId: 'vmap',
    initPosition: new vw.CameraPosition(
      new vw.CoordZ(lng, lat, 800),
      new vw.Direction(0, -90, 0)
    ),
    logo: false,
    navigation: true
  });
  map.start();

  // 카메라 높이 제한 — 너무 확대되면 지적도가 사라지므로 최소 150m 유지
  try {
    map.getPolicy().setMinimumDistance(300);
    map.getPolicy().setMaximumDistance(50000);
  } catch(e) {}

  // 클릭 → 부모에게 전달
  map.onClick.addEventListener(function(wp, ep, carto) {
    window.parent.postMessage({type: 'vwMapClicked'}, '*');
    if (!carto) return;
    window.parent.postMessage({
      type: 'vwClick',
      lng: carto.longitudeDD,
      lat: carto.latitudeDD
    }, '*');
  });

  // 우클릭 — 클릭한 위치의 실제 좌표 추출
  setTimeout(function() {
    try {
      var canvas = document.querySelector('canvas');
      canvas.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        var rect = canvas.getBoundingClientRect();
        var px = e.clientX - rect.left;
        var py = e.clientY - rect.top;
        var lng = null, lat = null;
        // VWorld 3.0: pickPosition으로 screen → world 변환
        try {
          var pos = map.pickPosition(px, py);
          if (pos && pos.longitudeDD !== undefined) {
            lng = pos.longitudeDD;
            lat = pos.latitudeDD;
          } else if (pos && pos.x !== undefined) {
            // cartographic 형태로 반환될 경우
            lng = pos.x; lat = pos.y;
          }
        } catch(ex1) { console.log('pickPosition 실패:', ex1); }
        // 대안: getCameraPosition (현재 카메라 타겟)
        if (lng === null) {
          try {
            var cp = map.getCameraPosition();
            if (cp && cp.position) { lng = cp.position.x; lat = cp.position.y; }
          } catch(ex2) {}
        }
        window.parent.postMessage({
          type: 'vwRightClick',
          x: e.clientX, y: e.clientY,
          lng: lng, lat: lat
        }, '*');
      });
    } catch(ex) { console.log('우클릭 바인딩 실패:', ex); }
  }, 2000);

  // 부모에 로드 완료 알림
  window.parent.postMessage({type: 'vwReady'}, '*');

  // 줌인 완료 후 로딩 커버 숨기기 (전국지도 장면 가림)
  setTimeout(function() {
    var cover = document.getElementById('loadingCover');
    if (cover) cover.classList.add('hide');
  }, 3500);
}

// 부모에서 메시지 수신
window.addEventListener('message', function(e) {
  if (!e.data || !map) return;

  // 지적도 토글
  if (e.data.type === 'toggleJijuk') {
    if (e.data.on && !jijukAdded) {
      var wl = new vw.Layers();
      var ws = new vw.source.TileWMS();
      ws.setUrl('https://api.vworld.kr/req/wms?Key=' + _apiKey + '&');
      ws.setParams('tilesize=512');
      ws.setLayers('lt_c_landinfobasemap');
      ws.setStyles('lt_c_landinfobasemap');
      ws.setFormat('image/png');
      _jijukLayer = new vw.layer.Tile(ws);
      wl.add(_jijukLayer);
      jijukAdded = true;
    } else if (!e.data.on && _jijukLayer) {
      try { _jijukLayer.setVisible(false); } catch(ex){}
    }
  }

  // 선택된 필지 하이라이트 (경계 빨간선)
  if (e.data.type === 'highlightParcel') {
    console.log('highlightParcel 호출됨, coords 개수:', e.data.coords ? e.data.coords.length : 0);
    try {
      // 기존 하이라이트 제거
      if (_parcelGeom) {
        try { _parcelGeom.destroy(); } catch(ex){}
        _parcelGeom = null;
      }
      var coords = e.data.coords;
      if (!coords || !coords.length) return;
      var ar = [];
      for (var i = 0; i < coords.length; i++) {
        ar.push(new vw.Coord(coords[i][0], coords[i][1]));
      }
      var col = new vw.Collection(ar);
      var poly = new vw.geom.Polygon(col);
      poly.setId('selParcel_' + Date.now());
      poly.setFillColor(new vw.Color(255, 60, 60, 80));
      poly.setOutLineColor(new vw.Color(255, 30, 30, 255));
      try { poly.setOutLineWidth(3); } catch(ex1){}
      poly.create();
      _parcelGeom = poly;
      console.log('필지 하이라이트 생성 성공');
    } catch(err) {
      console.error('필지 하이라이트 오류:', err);
    }
  }

  // 하이라이트 제거
  if (e.data.type === 'clearHighlight') {
    if (_parcelGeom) {
      try { _parcelGeom.destroy(); } catch(ex){}
      _parcelGeom = null;
    }
  }
});
</script>
</body></html>
